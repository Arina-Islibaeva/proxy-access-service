services:
  db:
    image: postgres:16
    container_name: proxy_postgres
    restart: always
    environment:
      POSTGRES_DB: proxy_db
      POSTGRES_USER: proxy_user
      POSTGRES_PASSWORD: proxy_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: proxy_backend
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app/backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - db

volumes:
  postgres_data:
